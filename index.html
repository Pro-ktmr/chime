<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>チャイム</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS/1fQ4sGBaxE4vAf/5sN2pvpKcOGOGjmB" crossorigin="anonymous">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f8f9fa;
    }
    .chime-card {
      max-width: 480px;
      width: 100%;
    }
    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.waiting { background-color: #6c757d; }
    .status-dot.active  { background-color: #198754; animation: pulse 1s infinite; }
    .status-dot.done    { background-color: #0d6efd; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes btn-flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; transform: scale(1.03); }
    }
    .btn-flash {
      animation: btn-flash 0.8s ease-in-out infinite;
      box-shadow: 0 0 12px rgba(13, 110, 253, 0.6);
    }
  </style>
</head>
<body>
  <div class="chime-card card shadow-sm">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-4">チャイム</h4>

      <div class="mb-3">
        <label for="time-main" class="form-label">チャイム時刻</label>
        <input type="time" id="time-main" class="form-control" step="1" value="08:50:00">
        <div class="form-text">
          <span id="status-pre" class="status-dot waiting"></span>予鈴: 1 分前 ／
          <span id="status-main" class="status-dot waiting"></span>本鈴: 設定時刻 ／
          <span id="status-20min" class="status-dot waiting"></span>20 分後
        </div>
      </div>

      <div class="d-grid gap-2">
        <button id="btn-start" class="btn btn-primary">開始</button>
        <button id="btn-stop" class="btn btn-outline-secondary" disabled>停止</button>
      </div>

      <div id="current-time" class="text-center text-muted mt-3 font-monospace fs-5"></div>
    </div>
  </div>

  <audio id="audio-pre" preload="auto" src="assets/chime_pre.m4a"></audio>
  <audio id="audio-main" preload="auto" src="assets/chime_main.m4a"></audio>
  <audio id="audio-20min" preload="auto" src="assets/chime_20min.mp3"></audio>

  <script>
    const timeMainInput = document.getElementById('time-main');
    const btnStart = document.getElementById('btn-start');
    const btnStop = document.getElementById('btn-stop');
    const currentTimeEl = document.getElementById('current-time');
    const audioPre = document.getElementById('audio-pre');
    const audioMain = document.getElementById('audio-main');
    const audio20min = document.getElementById('audio-20min');
    const statusPre = document.getElementById('status-pre');
    const statusMain = document.getElementById('status-main');
    const status20min = document.getElementById('status-20min');

    let timerId = null;
    let firedPre = false;
    let firedMain = false;
    let fired20min = false;

    function nowHHMMSS() {
      const now = new Date();
      return now.toTimeString().slice(0, 8); // "HH:MM:SS"
    }

    function normalizeTime(value) {
      if (!value) return null;
      const parts = value.split(':').map(Number);
      while (parts.length < 3) parts.push(0);
      return parts.map(p => String(p).padStart(2, '0')).join(':');
    }

    function addSeconds(hhmmss, sec) {
      const parts = hhmmss.split(':').map(Number);
      let total = parts[0] * 3600 + parts[1] * 60 + parts[2] + sec;
      total = ((total % 86400) + 86400) % 86400;
      const h = String(Math.floor(total / 3600)).padStart(2, '0');
      const m = String(Math.floor((total % 3600) / 60)).padStart(2, '0');
      const s = String(total % 60).padStart(2, '0');
      return h + ':' + m + ':' + s;
    }

    function updateClock() {
      currentTimeEl.textContent = nowHHMMSS();
    }

    function tick() {
      const now = nowHHMMSS();
      currentTimeEl.textContent = now;

      const timeMain = normalizeTime(timeMainInput.value);
      const timePre = timeMain ? addSeconds(timeMain, -60) : null;
      const time20min = timeMain ? addSeconds(timeMain, 20 * 60) : null;

      if (!firedPre && timePre && now >= timePre) {
        firedPre = true;
        audioPre.play();
        statusPre.className = 'status-dot done';
      }

      if (!firedMain && timeMain && now >= timeMain) {
        firedMain = true;
        audioMain.play();
        statusMain.className = 'status-dot done';
      }

      if (!fired20min && time20min && now >= time20min) {
        fired20min = true;
        audio20min.play();
        status20min.className = 'status-dot done';
      }

      if (firedPre && firedMain && fired20min) {
        stop();
      }
    }

    function start() {
      firedPre = false;
      firedMain = false;
      fired20min = false;

      const timeMain = normalizeTime(timeMainInput.value);
      const timePre = timeMain ? addSeconds(timeMain, -60) : null;
      const time20min = timeMain ? addSeconds(timeMain, 20 * 60) : null;
      const now = nowHHMMSS();

      statusPre.className = 'status-dot ' + (timePre ? (now >= timePre ? 'done' : 'active') : 'waiting');
      statusMain.className = 'status-dot ' + (timeMain ? (now >= timeMain ? 'done' : 'active') : 'waiting');
      status20min.className = 'status-dot ' + (time20min ? (now >= time20min ? 'done' : 'active') : 'waiting');

      btnStart.classList.remove('btn-flash');
      timeMainInput.disabled = true;
      btnStart.disabled = true;
      btnStop.disabled = false;

      timerId = setInterval(tick, 500);
      tick();
    }

    function stop() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      timeMainInput.disabled = false;
      btnStart.disabled = false;
      btnStart.classList.add('btn-flash');
      btnStop.disabled = true;

      if (!firedPre) statusPre.className = 'status-dot waiting';
      if (!firedMain) statusMain.className = 'status-dot waiting';
      if (!fired20min) status20min.className = 'status-dot waiting';
    }

    btnStart.addEventListener('click', start);
    btnStop.addEventListener('click', stop);

    // Keep clock always visible
    setInterval(updateClock, 1000);
    updateClock();

    // Flash start button until pressed
    btnStart.classList.add('btn-flash');
  </script>
</body>
</html>
